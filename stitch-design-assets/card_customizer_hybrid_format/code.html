<script>
        function updateFormat(format) {
            const printBtn = document.getElementById('btn-print');
            const digitalBtn = document.getElementById('btn-digital');
            const priceDisplay = document.getElementById('price-display');
            const addToCartBtn = document.getElementById('add-to-cart-btn');
            const qtySelector = document.getElementById('quantity-selector');

            if (format === 'digital') {
                printBtn.classList.remove('active', 'bg-[#fcf9f3]', 'text-[#1b3022]');
                printBtn.classList.add('text-emerald-100/60');
                
                digitalBtn.classList.add('active', 'bg-[#fcf9f3]', 'text-[#1b3022]');
                digitalBtn.classList.remove('text-emerald-100/60');
                
                priceDisplay.textContent = '$1.50 per digital card';
                addToCartBtn.innerHTML = '<span class="material-symbols-outlined">send</span> Add E-Card to Cart';
                qtySelector.classList.add('opacity-50', 'pointer-events-none');
            } else {
                digitalBtn.classList.remove('active', 'bg-[#fcf9f3]', 'text-[#1b3022]');
                digitalBtn.classList.add('text-emerald-100/60');
                
                printBtn.classList.add('active', 'bg-[#fcf9f3]', 'text-[#1b3022]');
                printBtn.classList.remove('text-emerald-100/60');
                
                priceDisplay.textContent = '$4.50 per card';
                addToCartBtn.innerHTML = '<span class="material-symbols-outlined">shopping_cart</span> Add Print to Cart';
                qtySelector.classList.remove('opacity-50', 'pointer-events-none');
            }
        }
    </script>
